# =============================================================================
# Grafana 설정 파일
# =============================================================================
# 참고: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/
# =============================================================================

[server]
http_port = 3000
domain = localhost

[security]
admin_user = admin
admin_password = admin123
disable_gravatar = true

[users]
allow_sign_up = false
allow_org_create = false

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/json/node-overview.json

[log]
mode = console
level = info
