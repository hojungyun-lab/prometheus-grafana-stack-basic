# =============================================================================
# Grafana Dashboard 프로비저닝
# =============================================================================
# JSON 파일 기반으로 대시보드를 자동 로드합니다.
# =============================================================================

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Learning Lab'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
