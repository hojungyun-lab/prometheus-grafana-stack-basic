# =============================================================================
# Grafana Data Source 프로비저닝 - Prometheus 자동 연결
# =============================================================================
# Grafana 시작 시 자동으로 Prometheus Data Source가 등록됩니다.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'        # scrape_interval과 동일하게 설정
      httpMethod: POST           # GET보다 큰 쿼리 처리 가능
