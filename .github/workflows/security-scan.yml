# =============================================================================
# 보안 스캔 CI - Security Scanning
# =============================================================================
# 트리거: push, pull_request, 주간 스케줄
# 검사 항목: gitleaks (시크릿 유출), Trivy (취약점), Hadolint (Dockerfile)
# =============================================================================

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'      # 매주 월요일 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Gitleaks - 시크릿 유출 탐지
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 전체 히스토리 스캔

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 2. Trivy - 취약점 스캔 (Docker 이미지 & 설정 파일)
  # ---------------------------------------------------------------------------
  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ---------------------------------------------------------------------------
  # 3. Hadolint - Dockerfile 보안 검사
  # ---------------------------------------------------------------------------
  hadolint:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint docker/ubuntu/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/ubuntu/Dockerfile
          config: .hadolint.yaml

      - name: Lint custom-exporter/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: custom-exporter/Dockerfile
          config: .hadolint.yaml
